name: Update robobet snapshot

on:
  schedule:
    # Run daily at 08:00 Moscow Time (UTC+3) -> 05:00 UTC
    - cron: '0 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run update script
        env:
          REF_URL: 'https://botanapp.github.io/neurobet/'
        run: |
          python scripts/update_roboblock.py

      - name: Run aggregator and notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # skip if secrets not provided (safe for public forks)
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo 'TELEGRAM secrets not set - skipping aggregator'
            exit 0
          fi
          python scripts/aggregate_and_notify.py --json roboblock.json || true

      - name: Debug generated files
        run: |
          echo '--- ls -la ---'
          ls -la
          echo '--- git status ---'
          git status --porcelain
          echo '--- head roboblock.html (if exists) ---'
          if [ -f roboblock.html ]; then head -n 50 roboblock.html; else echo 'roboblock.html not found'; fi
          echo '--- head roboblock.json (if exists) ---'
          if [ -f roboblock.json ]; then head -n 50 roboblock.json; else echo 'roboblock.json not found'; fi

      - name: Commit changes if any
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add roboblock.html roboblock.json || true
            git commit -m "Update roboblock snapshot" || true
            # push using token to avoid auth issues
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:${{ github.ref_name }} || true
          else
            echo "No changes"
          fi
